name: Open Reachable Remediation PR
description: Open a same-repository remediation pull request with GITHUB_TOKEN.

inputs:
  branch:
    description: Same-repository remediation branch.
    required: true
  base:
    description: Base branch.
    required: true
    default: main
  title:
    description: Pull request title.
    required: false
    default: Reachable remediation proof

outputs:
  pr-url:
    description: URL of the created pull request.
    value: ${{ steps.open-pr.outputs.pr-url }}

runs:
  using: composite
  steps:
    - name: Open PR
      id: open-pr
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        echo "Opening Reachable remediation PR:"
        echo "  base: ${{ inputs.base }}"
        echo "  head: ${{ inputs.branch }}"
        pr_url="$(gh pr create \
          --base "${{ inputs.base }}" \
          --head "${{ inputs.branch }}" \
          --title "${{ inputs.title }}" \
          --body "Reachable remediation branch with structured proof artifacts. Review the published proof page and merge when ready.")"
        echo "Reachable remediation PR: ${pr_url}"
        echo "pr-url=${pr_url}" >> "$GITHUB_OUTPUT"
