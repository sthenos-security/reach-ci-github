name: Setup Reachable
description: Install or update Reachable and report cache evidence.

inputs:
  version:
    description: Reachable version to install. Empty means latest from reach-dist.
    required: false
    default: ""
  dist-repo:
    description: Distribution repository containing install.sh.
    required: false
    default: sthenos-security/reach-dist
  fresh-scan:
    description: Delete ~/.reachable before installation.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Restore Reachable cache
      if: ${{ inputs.fresh-scan != 'true' }}
      uses: actions/cache/restore@v4
      with:
        path: ~/.reachable
        key: reachable-${{ runner.os }}-${{ github.repository_id }}-${{ inputs.version }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          reachable-${{ runner.os }}-${{ github.repository_id }}-${{ inputs.version }}-
          reachable-${{ runner.os }}-${{ github.repository_id }}-
          reachable-${{ runner.os }}-

    - name: Install Reachable
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ inputs.fresh-scan }}" = "true" ]; then
          echo "Reachable fresh scan requested: deleting ~/.reachable."
          rm -rf "$HOME/.reachable"
        fi
        mkdir -p "$HOME/.reachable"
        echo "$HOME/.reachable/venv/bin" >> "$GITHUB_PATH"
        echo "$HOME/.reachable/tools/bin" >> "$GITHUB_PATH"
        export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
        install_script="${RUNNER_TEMP:-/tmp}/reachable-install.sh"
        installer_url="https://raw.githubusercontent.com/${{ inputs.dist-repo }}/main/install.sh"
        install_args=(--update)
        if [ -n "${{ inputs.version }}" ]; then
          install_args+=(--version "${{ inputs.version }}")
        fi
        curl -fsSL "$installer_url" -o "$install_script"
        bash "$install_script" "${install_args[@]}"
        reachctl version
        echo "Reachable cache size: $(du -sh "$HOME/.reachable" 2>/dev/null | awk '{print $1}' || echo 0)"

    - name: Save Reachable cache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: ~/.reachable
        key: reachable-${{ runner.os }}-${{ github.repository_id }}-${{ inputs.version }}-${{ github.run_id }}-${{ github.run_attempt }}

