name: Setup Reachable
description: Install or update Reachable and report cache evidence.

inputs:
  dist-repo:
    description: Distribution repository containing install.sh.
    required: false
    default: sthenos-security/reach-dist
  dist-base-url:
    description: Optional candidate distribution base URL containing latest.json and wheel assets.
    required: false
    default: ""
  fresh-scan:
    description: Delete ~/.reachable before installation.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Restore Reachable cache
      if: ${{ inputs.fresh-scan != 'true' }}
      uses: actions/cache/restore@v4
      with:
        path: ~/.reachable
        key: reachable-${{ runner.os }}-${{ github.repository_id }}-latest-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          reachable-${{ runner.os }}-${{ github.repository_id }}-latest-
          reachable-${{ runner.os }}-${{ github.repository_id }}-
          reachable-${{ runner.os }}-

    - name: Install Reachable
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ inputs.fresh-scan }}" = "true" ]; then
          echo "Reachable fresh scan requested: deleting ~/.reachable."
          rm -rf "$HOME/.reachable"
        fi
        mkdir -p "$HOME/.reachable"
        echo "$HOME/.reachable/venv/bin" >> "$GITHUB_PATH"
        echo "$HOME/.reachable/tools/bin" >> "$GITHUB_PATH"
        export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
        install_script="${RUNNER_TEMP:-/tmp}/reachable-install.sh"
        installer_url="https://raw.githubusercontent.com/${{ inputs.dist-repo }}/main/install.sh"
        if [ -n "${{ inputs.dist-base-url }}" ]; then
          export REACHABLE_DIST_BASE_URL="${{ inputs.dist-base-url }}"
          echo "Using Reachable candidate dist base URL: ${REACHABLE_DIST_BASE_URL}"
        fi
        install_args=(--update)
        for attempt in 1 2 3; do
          if curl -fsSL "$installer_url" -o "$install_script" && bash "$install_script" "${install_args[@]}"; then
            break
          fi
          if [ "$attempt" -eq 3 ]; then
            echo "Reachable installer failed after ${attempt} attempts." >&2
            exit 2
          fi
          echo "Reachable installer attempt ${attempt} failed; retrying." >&2
          sleep 5
        done
        reachctl version
        echo "Reachable cache size: $(du -sh "$HOME/.reachable" 2>/dev/null | awk '{print $1}' || echo 0)"

    - name: Save Reachable cache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: ~/.reachable
        key: reachable-${{ runner.os }}-${{ github.repository_id }}-latest-${{ github.run_id }}-${{ github.run_attempt }}
