name: Reachable Copilot Remediation Dispatch

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write
  security-events: write
  pages: write
  id-token: write

jobs:
  reachable:
    uses: sthenos-security/reach-ci-github/.github/workflows/auto-remediate.yml@v1
    with:
      target_branch: main
      fail_on: exploitable
      remediate: true
      rescan_only: false
      ai_mode: copilot-github
      max_batches: 3
      publish_report: true
      require_ai: true
    secrets: inherit
